<app-dashboard-header title="Monitoramento" subtitle="Acompanhe todos os sistemas do veículo em tempo real"></app-dashboard-header>

<div class="p-6 space-y-6">
  <!-- Metrics -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div *ngFor="let metric of metrics" class="glass rounded-xl p-4 border border-border animate-fade-in-up">
      <div class="flex items-center gap-3">
        <div class="p-2 rounded-lg bg-primary/10">
          <lucide-icon [img]="metric.icon" class="h-4 w-4 text-primary"></lucide-icon>
        </div>
        <div>
          <p class="text-xs text-muted-foreground">{{ metric.label }}</p>
          <p class="text-lg font-bold">{{ metric.value }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Vehicle Systems -->
  <div class="glass rounded-xl p-6 border border-border">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-semibold flex items-center gap-2">
        <lucide-icon [img]="Activity" class="h-5 w-5 text-primary"></lucide-icon>
        Status dos Sistemas
      </h3>
      <span class="text-xs px-2 py-1 rounded-full bg-success/10 text-success flex items-center gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></span>
        8/8 Online
      </span>
    </div>
    <app-vehicle-status></app-vehicle-status>
  </div>

  <!-- Network Traffic -->
  <div class="glass rounded-xl p-6 border border-border">
    <div class="flex items-center gap-2 mb-6">
      <lucide-icon [img]="Wifi" class="h-5 w-5 text-accent"></lucide-icon>
      <h3 class="font-semibold">Tráfego de Rede</h3>
    </div>
    <div class="grid md:grid-cols-2 gap-6">
      <!-- CAN Bus -->
      <div>
        <p class="text-sm text-muted-foreground mb-3">CAN Bus (mensagens/s)</p>
        <div class="space-y-2">
          <div *ngFor="let bus of canBuses" class="flex items-center justify-between p-2 rounded-lg bg-secondary/30">
            <span class="text-sm font-mono">{{ bus.id }}</span>
            <div class="flex items-center gap-2">
              <span class="text-sm">{{ bus.packets.toLocaleString('pt-BR') }}</span>
              <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
            </div>
          </div>
        </div>
      </div>
      <!-- External -->
      <div>
        <p class="text-sm text-muted-foreground mb-3">Comunicações Externas</p>
        <div class="space-y-2">
          <div *ngFor="let conn of connections" class="flex items-center justify-between p-2 rounded-lg bg-secondary/30">
            <span class="text-sm font-mono">{{ conn.id }}</span>
            <div class="flex items-center gap-4 text-xs">
              <span class="text-success">↓ {{ conn.inbound }}</span>
              <span class="text-primary">↑ {{ conn.outbound }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Logs -->
  <div class="glass rounded-xl p-6 border border-border">
    <app-security-logs></app-security-logs>
  </div>
</div>
