<app-dashboard-header title="Análise de IA" subtitle="Insights e recomendações gerados por machine learning"></app-dashboard-header>

<div class="p-6 space-y-6">
  <!-- AI Stats -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div *ngFor="let stat of aiStats" class="glass rounded-xl p-6 border border-border animate-fade-in-up">
      <div class="flex items-start gap-4">
        <div class="p-3 rounded-xl bg-primary/10" [ngClass]="stat.color">
          <lucide-icon [img]="stat.icon" class="h-5 w-5"></lucide-icon>
        </div>
        <div>
          <p class="text-sm text-muted-foreground">{{ stat.label }}</p>
          <p class="text-xl font-bold">{{ stat.value }}</p>
          <p class="text-xs text-muted-foreground mt-1">{{ stat.detail }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="grid lg:grid-cols-2 gap-6">
    <!-- Insights -->
    <div class="glass rounded-xl p-6 border border-border">
      <app-ai-insights></app-ai-insights>
    </div>

    <!-- Threat Classification -->
    <div class="glass rounded-xl p-6 border border-border">
      <div class="flex items-center gap-2 mb-6">
        <lucide-icon [img]="Target" class="h-5 w-5 text-warning"></lucide-icon>
        <h3 class="font-semibold">Classificação de Ameaças</h3>
      </div>
      <div class="space-y-4">
        <div *ngFor="let item of categories">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm">{{ item.category }}</span>
            <span class="text-sm text-muted-foreground">{{ item.count }} ({{ item.percentage }}%)</span>
          </div>
          <div class="h-2 rounded-full bg-secondary overflow-hidden">
            <div class="h-full bg-gradient-to-r from-primary to-accent rounded-full transition-all duration-700"
                 [style.width.%]="item.percentage"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Predictive Analysis -->
  <div class="glass rounded-xl p-6 border border-border">
    <div class="flex items-center gap-2 mb-6">
      <lucide-icon [img]="TrendingUp" class="h-5 w-5 text-accent"></lucide-icon>
      <h3 class="font-semibold">Análise Preditiva</h3>
      <span class="text-xs px-2 py-0.5 rounded-full bg-accent/10 text-accent">Beta</span>
    </div>
    <div class="grid md:grid-cols-3 gap-4">
      <div *ngFor="let item of predictions" class="p-4 rounded-xl bg-secondary/50 border border-border">
        <p class="text-sm text-muted-foreground mb-1">{{ item.title }}</p>
        <p class="text-lg font-semibold mb-2">{{ item.prediction }}</p>
        <div class="flex items-center gap-2">
          <div class="flex-1 h-1 rounded-full bg-secondary overflow-hidden">
            <div class="h-full bg-accent rounded-full" [style.width.%]="item.confidence"></div>
          </div>
          <span class="text-xs text-muted-foreground">{{ item.confidence }}%</span>
        </div>
        <p class="text-xs text-muted-foreground mt-2">{{ item.description }}</p>
      </div>
    </div>
  </div>
</div>
