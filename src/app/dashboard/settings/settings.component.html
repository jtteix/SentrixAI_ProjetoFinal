<app-dashboard-header title="Configurações" subtitle="Personalize sua experiência na plataforma"></app-dashboard-header>

<div class="p-6 space-y-6">
  <div class="grid md:grid-cols-2 gap-6">
    <!-- Profile -->
 <div class="glass rounded-xl p-6 border border-border animate-fade-in-up">
  <div class="flex items-center gap-3 mb-6">
    <div class="p-2 rounded-lg bg-primary/10"><lucide-icon [img]="User" class="h-5 w-5 text-primary"></lucide-icon></div>
    <h3 class="font-semibold">Perfil</h3>
  </div>
  <div class="space-y-4">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center">
        <span class="text-xl font-bold text-primary">{{ user.initials }}</span>
      </div>
      <div>
        <p class="font-medium">{{ user.name }}</p>
        <p class="text-sm text-muted-foreground">{{ user.email }}</p>
      </div>
    </div>
    <button class="w-full h-9 px-4 rounded-lg border border-border hover:bg-secondary text-sm transition-colors">
      Editar Perfil
    </button>
  </div>
</div>

    <!-- Notifications -->
    <div class="glass rounded-xl p-6 border border-border animate-fade-in-up">
      <div class="flex items-center gap-3 mb-6">
        <div class="p-2 rounded-lg bg-warning/10"><lucide-icon [img]="Bell" class="h-5 w-5 text-warning"></lucide-icon></div>
        <h3 class="font-semibold">Notificações</h3>
      </div>
      <div class="space-y-3">
        <div *ngFor="let item of notifications; let i = index"
             class="flex items-center justify-between p-3 rounded-lg bg-secondary/30">
          <span class="text-sm">{{ item.label }}</span>
          <button (click)="toggleNotification(i)"
                  class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
                  [class.bg-success]="item.enabled" [class.bg-secondary]="!item.enabled">
            <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
                  [class.translate-x-6]="item.enabled" [class.translate-x-1]="!item.enabled"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Security -->
    <div class="glass rounded-xl p-6 border border-border animate-fade-in-up">
      <div class="flex items-center gap-3 mb-6">
        <div class="p-2 rounded-lg bg-success/10"><lucide-icon [img]="Shield" class="h-5 w-5 text-success"></lucide-icon></div>
        <h3 class="font-semibold">Segurança</h3>
      </div>
      <div class="space-y-3">
        <div class="flex items-center justify-between p-3 rounded-lg bg-secondary/30">
          <div class="flex items-center gap-3">
            <lucide-icon [img]="Key" class="h-4 w-4 text-muted-foreground"></lucide-icon>
            <span class="text-sm">Senha</span>
          </div>
          <button class="text-sm px-3 py-1 rounded-lg hover:bg-secondary transition-colors">Alterar</button>
        </div>
        <div class="flex items-center justify-between p-3 rounded-lg bg-secondary/30">
          <div class="flex items-center gap-3">
            <lucide-icon [img]="Smartphone" class="h-4 w-4 text-muted-foreground"></lucide-icon>
            <span class="text-sm">Autenticação 2FA</span>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-success/10 text-success">Ativo</span>
        </div>
      </div>
    </div>

    <!-- Appearance -->
    <div class="glass rounded-xl p-6 border border-border animate-fade-in-up">
      <div class="flex items-center gap-3 mb-6">
        <div class="p-2 rounded-lg bg-accent/10"><lucide-icon [img]="Palette" class="h-5 w-5 text-accent"></lucide-icon></div>
        <h3 class="font-semibold">Aparência</h3>
      </div>
      <div class="space-y-4">
        <div>
          <p class="text-sm text-muted-foreground mb-2">Tema</p>
          <div class="flex gap-2">
            <button *ngFor="let theme of themes; let i = index"
                    (click)="selectTheme(i)"
                    class="px-4 py-2 rounded-lg text-sm transition-colors"
                    [ngClass]="theme.active ? 'bg-primary text-primary-foreground' : 'bg-secondary hover:bg-secondary/80'">
              {{ theme.name }}
            </button>
          </div>
        </div>
        <div>
          <p class="text-sm text-muted-foreground mb-2">Idioma</p>
          <div class="flex items-center gap-2 p-3 rounded-lg bg-secondary/30">
            <lucide-icon [img]="Globe" class="h-4 w-4 text-muted-foreground"></lucide-icon>
            <span class="text-sm">Português (Brasil)</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Danger Zone -->
  <div class="rounded-xl p-6 border border-danger/20 bg-danger/5 animate-fade-in-up">
    <h3 class="font-semibold text-danger mb-4">Zona de Perigo</h3>
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <p class="font-medium">Excluir Conta</p>
        <p class="text-sm text-muted-foreground">Esta ação é irreversível e removerá todos os seus dados.</p>
      </div>
      <button class="px-4 py-2 rounded-lg border border-danger text-danger hover:bg-danger/10 text-sm transition-colors">
        Excluir Conta
      </button>
    </div>
  </div>
</div>
