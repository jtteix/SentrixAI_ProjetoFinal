<app-dashboard-header title="Localização & GPS" subtitle="Monitoramento de localização e proteção contra spoofing"></app-dashboard-header>

<div class="p-6 space-y-6">
  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div *ngFor="let stat of stats" class="glass rounded-xl p-4 border border-border animate-fade-in-up">
      <div class="flex items-center gap-3">
        <div class="p-2 rounded-lg bg-primary/10">
          <lucide-icon [img]="stat.icon" class="h-4 w-4" [ngClass]="stat.color"></lucide-icon>
        </div>
        <div>
          <p class="text-xs text-muted-foreground">{{ stat.label }}</p>
          <p class="text-lg font-bold" [ngClass]="stat.color">{{ stat.value }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Map Simulation -->
  <div class="glass rounded-xl border border-border overflow-hidden">
    <div class="relative h-96 bg-secondary/30">
      <div class="absolute inset-0 grid-pattern opacity-30"></div>
      <!-- Vehicle marker -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
        <div class="relative">
          <div class="absolute inset-0 bg-primary/30 blur-xl rounded-full animate-ping"></div>
          <div class="relative w-12 h-12 rounded-full bg-primary flex items-center justify-center">
            <lucide-icon [img]="Navigation" class="h-6 w-6 text-primary-foreground"></lucide-icon>
          </div>
        </div>
      </div>
      <!-- Zones -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 rounded-full border-2 border-success/30"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 rounded-full border border-warning/20"></div>
      <!-- Overlays -->
      <div class="absolute bottom-4 left-4 glass-strong rounded-lg px-4 py-2">
        <p class="text-xs text-muted-foreground">Coordenadas</p>
        <p class="text-sm font-mono">-12.9714° S, -38.5014° W</p>
      </div>
      <div class="absolute bottom-4 right-4 glass-strong rounded-lg px-4 py-2">
        <p class="text-xs text-muted-foreground">Velocidade</p>
        <p class="text-sm font-mono">0 km/h</p>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="glass rounded-xl p-6 border border-border">
    <div class="flex items-center gap-2 mb-4">
      <lucide-icon [img]="Clock" class="h-5 w-5 text-primary"></lucide-icon>
      <h3 class="font-semibold">Histórico de Localização</h3>
    </div>
    <div class="space-y-3">
      <div *ngFor="let entry of history; let i = index" class="flex items-center gap-4 p-3 rounded-lg bg-secondary/30">
        <div class="relative">
          <div class="w-3 h-3 rounded-full bg-primary"></div>
          <div *ngIf="i < history.length - 1" class="absolute top-full left-1/2 -translate-x-1/2 w-px h-8 bg-border"></div>
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">{{ entry.location }}</p>
          <p class="text-xs text-muted-foreground">{{ entry.time }}</p>
        </div>
        <span class="text-xs text-muted-foreground">{{ entry.duration }}</span>
      </div>
    </div>
  </div>

  <!-- GPS Integrity -->
  <div class="glass rounded-xl p-6 border border-border">
    <div class="flex items-center gap-2 mb-4">
      <lucide-icon [img]="Shield" class="h-5 w-5 text-success"></lucide-icon>
      <h3 class="font-semibold">Integridade do GPS</h3>
    </div>
    <div class="grid md:grid-cols-3 gap-4">
      <div *ngFor="let metric of integrity" class="p-4 rounded-lg bg-secondary/30">
        <p class="text-sm text-muted-foreground">{{ metric.label }}</p>
        <p class="text-xl font-bold">{{ metric.value }}</p>
        <p class="text-xs text-success">{{ metric.status }}</p>
      </div>
    </div>
  </div>
</div>
