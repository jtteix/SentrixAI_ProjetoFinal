<app-dashboard-header title="Dashboard de Segurança" subtitle="Monitoramento em tempo real do seu veículo"></app-dashboard-header>

<div class="p-6 space-y-6">
  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <app-stat-card *ngFor="let s of stats"
      [title]="s.title" [value]="s.value" [change]="s.change"
      [changeType]="s.changeType" [icon]="s.icon" [iconColor]="s.iconColor">
    </app-stat-card>
  </div>

  <!-- Main grid -->
  <div class="grid lg:grid-cols-3 gap-6">
    <!-- Left -->
    <div class="lg:col-span-2 space-y-6">
      <!-- Vehicle Status -->
      <div class="glass rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold flex items-center gap-2">
            <lucide-icon [img]="Activity" class="h-5 w-5 text-primary"></lucide-icon>
            Status do Veículo
          </h3>
          <span class="text-xs px-2 py-1 rounded-full bg-success/10 text-success flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></span>
            Todos os sistemas online
          </span>
        </div>
        <app-vehicle-status></app-vehicle-status>
      </div>

      <!-- Threat chart -->
      <div class="glass rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold flex items-center gap-2">
            <lucide-icon [img]="Target" class="h-5 w-5 text-warning"></lucide-icon>
            Atividade de Ameaças (24h)
          </h3>
          <div class="flex items-center gap-4 text-xs">
            <div class="flex items-center gap-2">
              <div class="w-3 h-0.5 bg-warning rounded"></div>
              <span class="text-muted-foreground">Detectadas</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-0.5 bg-success rounded"></div>
              <span class="text-muted-foreground">Bloqueadas</span>
            </div>
          </div>
        </div>
        <app-threat-chart type="threats"></app-threat-chart>
      </div>

      <!-- Recent threats -->
      <div class="glass rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold flex items-center gap-2">
            <lucide-icon [img]="AlertTriangle" class="h-5 w-5 text-warning"></lucide-icon>
            Ameaças Recentes
          </h3>
          <a routerLink="/dashboard/threats" class="text-xs text-primary hover:underline">Ver todas →</a>
        </div>
        <app-threat-list [threats]="recentThreats"></app-threat-list>
      </div>
    </div>

    <!-- Right -->
    <div class="space-y-6">
      <!-- Security Score -->
      <div class="glass rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold">Security Score</h3>
          <lucide-icon [img]="Clock" class="h-4 w-4 text-muted-foreground"></lucide-icon>
        </div>
        <app-security-score [score]="94" size="lg"></app-security-score>
        <div class="mt-4">
          <app-threat-chart type="score"></app-threat-chart>
        </div>
      </div>

      <!-- AI Insights -->
      <div class="glass rounded-xl p-6 border border-border">
        <app-ai-insights></app-ai-insights>
      </div>
    </div>
  </div>

  <!-- Security Logs -->
  <div class="glass rounded-xl p-6 border border-border">
    <app-security-logs></app-security-logs>
  </div>
</div>
