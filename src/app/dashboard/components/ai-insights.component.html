<div class="space-y-4">
  <div class="flex items-center gap-2 mb-4">
    <lucide-icon [img]="Brain" class="h-5 w-5 text-accent"></lucide-icon>
    <h3 class="font-semibold">Insights da IA</h3>
    <span class="text-xs px-2 py-0.5 rounded-full bg-accent/10 text-accent">ML Model v3.2</span>
  </div>
  <div class="space-y-3">
    <div *ngFor="let insight of insights"
         class="p-4 rounded-xl border"
         [ngClass]="[bgClass(insight.type), borderClass(insight.type)]">
      <div class="flex items-start gap-3">
        <div class="p-2 rounded-lg" [ngClass]="bgClass(insight.type)">
          <lucide-icon [img]="insight.icon" class="h-4 w-4" [ngClass]="iconClass(insight.type)"></lucide-icon>
        </div>
        <div class="flex-1">
          <div class="flex items-center justify-between mb-1">
            <h4 class="text-sm font-medium">{{ insight.title }}</h4>
            <span class="text-xs text-muted-foreground">{{ insight.confidence }}% confiança</span>
          </div>
          <p class="text-xs text-muted-foreground mb-2">{{ insight.description }}</p>
          <button *ngIf="insight.action" class="text-xs font-medium hover:underline" [ngClass]="iconClass(insight.type)">
            {{ insight.action }} →
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
