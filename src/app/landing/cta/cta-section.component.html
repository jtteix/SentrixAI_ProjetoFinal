<section class="relative py-24 md:py-32 overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-b from-background via-primary/10 to-background"></div>
  <div class="absolute inset-0 grid-pattern opacity-40"></div>
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-accent/20 rounded-full blur-3xl animate-pulse" style="animation-delay:2.5s"></div>

  <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
    <!-- Badge -->
    <div appScrollReveal [revealDelay]="100" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary/10 border border-primary/20 mb-8">
      <lucide-icon [img]="Sparkles" class="h-4 w-4 text-primary"></lucide-icon>
      <span class="text-sm text-primary">Comece Agora</span>
    </div>

    <!-- Headline -->
    <h2 appScrollReveal [revealDelay]="200" class="text-4xl md:text-6xl font-bold mb-6">
      Proteja o Futuro da <span class="gradient-text text-glow-cyan">Mobilidade</span>
    </h2>

    <!-- Subheadline -->
    <p appScrollReveal [revealDelay]="300" class="text-lg md:text-xl text-muted-foreground mb-10 max-w-2xl mx-auto">
      Junte-se à próxima geração de cibersegurança automotiva.
      Proteção inteligente, em tempo real, para veículos conectados.
    </p>

    <!-- CTAs -->
    <div appScrollReveal [revealDelay]="400" class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a routerLink="/login"
         class="group inline-flex items-center justify-center h-14 px-8 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 glow-cyan text-lg font-medium transition-all">
        Acessar o Sistema
        <lucide-icon [img]="ArrowRight" class="ml-2 h-5 w-5 group-hover:translate-x-1 transition-transform"></lucide-icon>
      </a>
      <button class="inline-flex items-center justify-center h-14 px-8 rounded-lg border border-border hover:bg-secondary text-lg font-medium transition-all">
        Falar com Especialista
      </button>
    </div>

    <!-- Certifications -->
    <div appScrollReveal="scale" [revealDelay]="550" class="mt-12 flex flex-wrap items-center justify-center gap-8 text-muted-foreground">
      <div class="flex items-center gap-2">
        <lucide-icon [img]="Shield" class="h-5 w-5 text-success"></lucide-icon>
        <span class="text-sm">Certificado ISO 27001</span>
      </div>
      <div class="flex items-center gap-2">
        <lucide-icon [img]="Shield" class="h-5 w-5 text-success"></lucide-icon>
        <span class="text-sm">Conformidade LGPD</span>
      </div>
      <div class="flex items-center gap-2">
        <lucide-icon [img]="Shield" class="h-5 w-5 text-success"></lucide-icon>
        <span class="text-sm">SOC 2 Type II</span>
      </div>
    </div>
  </div>
</section>
