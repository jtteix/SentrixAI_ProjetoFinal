<div class="min-h-screen bg-background flex items-center justify-center relative overflow-hidden">
  <div class="absolute inset-0 grid-pattern opacity-30"></div>
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-accent/10 rounded-full blur-3xl"></div>

  <a routerLink="/" class="absolute top-6 left-6 flex items-center gap-2 text-sm text-muted-foreground hover:text-foreground transition-colors">
    ← Voltar ao início
  </a>

  <div class="relative z-10 w-full max-w-md px-6">
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="relative">
        <div class="absolute inset-0 bg-primary/30 blur-xl rounded-full"></div>
        <lucide-icon [img]="Shield" class="relative h-10 w-10 text-primary"></lucide-icon>
      </div>
      <span class="text-2xl font-bold tracking-tight">SENTRIX <span class="text-primary">AI</span></span>
    </div>

    <div class="flex rounded-xl bg-secondary/50 p-1 mb-6 border border-border">
      <button (click)="switchMode('login')"
              class="flex-1 py-2 text-sm font-medium rounded-lg transition-all"
              [class.bg-card]="mode === 'login'"
              [class.text-foreground]="mode === 'login'"
              [class.shadow-sm]="mode === 'login'"
              [class.text-muted-foreground]="mode !== 'login'">
        Entrar
      </button>
      <button (click)="switchMode('register')"
              class="flex-1 py-2 text-sm font-medium rounded-lg transition-all"
              [class.bg-card]="mode === 'register'"
              [class.text-foreground]="mode === 'register'"
              [class.shadow-sm]="mode === 'register'"
              [class.text-muted-foreground]="mode !== 'register'">
        Criar Conta
      </button>
    </div>

    <div class="glass rounded-2xl border border-border p-8">

      <div *ngIf="error" class="flex items-center gap-2 p-3 rounded-lg bg-danger/10 border border-danger/20 mb-5 text-sm text-danger">
        <lucide-icon [img]="AlertCircle" class="h-4 w-4 flex-shrink-0"></lucide-icon>
        {{ error }}
      </div>

      <div *ngIf="mode === 'login'" class="space-y-4 animate-fade-in-up">
        <div>
          <p class="text-xl font-semibold mb-1">Bem-vindo de volta</p>
          <p class="text-sm text-muted-foreground">Acesse sua central de segurança automotiva</p>
        </div>

        <div class="space-y-3 pt-2">
          <div class="relative">
            <lucide-icon [img]="Mail" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 z-10"></lucide-icon>
            <input type="email" [(ngModel)]="loginEmail" placeholder="seu@email.com"
                   class="w-full pl-10 pr-4 h-11 rounded-lg bg-white dark:bg-white border border-border text-sm placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-black dark:text-black"
                   (keyup.enter)="onLogin()" />
          </div>

          <div class="relative">
            <lucide-icon [img]="Lock" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 z-10"></lucide-icon>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="loginPassword" placeholder="Senha"
                   class="w-full pl-10 pr-10 h-11 rounded-lg bg-white dark:bg-white border border-border text-sm placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-black dark:text-black"
                   (keyup.enter)="onLogin()" />
            <button type="button" (click)="showPassword = !showPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-800 transition-colors">
              <lucide-icon [img]="showPassword ? EyeOff : Eye" class="h-4 w-4"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="flex justify-end">
          <a href="#" class="text-xs text-primary hover:underline">Esqueceu a senha?</a>
        </div>

        <button (click)="onLogin()" [disabled]="loading"
                class="w-full flex items-center justify-center gap-2 h-11 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 glow-cyan-sm text-sm font-medium transition-all disabled:opacity-60 disabled:cursor-not-allowed">
          <span *ngIf="!loading" class="flex items-center gap-2">
            Acessar Dashboard
            <lucide-icon [img]="ArrowRight" class="h-4 w-4"></lucide-icon>
          </span>
          <span *ngIf="loading" class="flex items-center gap-2">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            Autenticando...
          </span>
        </button>

        <p class="text-center text-xs text-muted-foreground pt-2">
          Não tem conta?
          <button (click)="switchMode('register')" class="text-primary hover:underline ml-1">Criar agora</button>
        </p>
      </div>

      <div *ngIf="mode === 'register'" class="space-y-4 animate-fade-in-up">
        <div>
          <p class="text-xl font-semibold mb-1">Criar sua conta</p>
          <p class="text-sm text-muted-foreground">Comece a proteger seu veículo gratuitamente</p>
        </div>

        <div class="space-y-3 pt-2">
          <div class="relative">
            <lucide-icon [img]="User" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 z-10"></lucide-icon>
            <input type="text" [(ngModel)]="registerName" placeholder="Seu nome completo"
                   class="w-full pl-10 pr-4 h-11 rounded-lg bg-white dark:bg-white border border-border text-sm placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-black dark:text-black" />
          </div>

          <div class="relative">
            <lucide-icon [img]="Mail" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 z-10"></lucide-icon>
            <input type="email" [(ngModel)]="registerEmail" placeholder="seu@email.com"
                   class="w-full pl-10 pr-4 h-11 rounded-lg bg-white dark:bg-white border border-border text-sm placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-black dark:text-black" />
          </div>

          <div class="relative">
            <lucide-icon [img]="Lock" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 z-10"></lucide-icon>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="registerPassword" placeholder="Senha (mín. 6 caracteres)"
                   class="w-full pl-10 pr-10 h-11 rounded-lg bg-white dark:bg-white border border-border text-sm placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-black dark:text-black" />
            <button type="button" (click)="showPassword = !showPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-800 transition-colors">
              <lucide-icon [img]="showPassword ? EyeOff : Eye" class="h-4 w-4"></lucide-icon>
            </button>
          </div>

          <div class="relative">
            <lucide-icon [img]="Lock" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 z-10"></lucide-icon>
            <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="registerConfirm" placeholder="Confirmar senha"
                   class="w-full pl-10 pr-10 h-11 rounded-lg bg-white dark:bg-white border border-border text-sm placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-black dark:text-black"
                   (keyup.enter)="onRegister()" />
            <button type="button" (click)="showConfirm = !showConfirm"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-800 transition-colors">
              <lucide-icon [img]="showConfirm ? EyeOff : Eye" class="h-4 w-4"></lucide-icon>
            </button>
          </div>

          <div class="flex items-start gap-2 pt-1 pb-2">
            <input 
              type="checkbox" 
              id="privacyTerms" 
              [(ngModel)]="registerTerms"
              class="mt-1 h-4 w-4 rounded bg-secondary/50 border-border text-primary focus:ring-primary focus:ring-offset-background transition-colors cursor-pointer"
            />
            <label for="privacyTerms" class="text-xs text-muted-foreground leading-tight cursor-pointer select-none">
              Li e aceito os <a routerLink="/privacy" target="_blank" class="text-primary hover:underline font-medium">Termos de Privacidade</a> e uso de dados da plataforma.
            </label>
          </div>
        </div>

        <button (click)="onRegister()" [disabled]="loading || !registerTerms"
                class="w-full flex items-center justify-center gap-2 h-11 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 glow-cyan-sm text-sm font-medium transition-all disabled:opacity-40 disabled:cursor-not-allowed">
          <span *ngIf="!loading" class="flex items-center gap-2">
            Criar Conta
            <lucide-icon [img]="ArrowRight" class="h-4 w-4"></lucide-icon>
          </span>
          <span *ngIf="loading" class="flex items-center gap-2">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            Criando conta...
          </span>
        </button>

        <p class="text-center text-xs text-muted-foreground pt-2">
          Já tem uma conta?
          <button (click)="switchMode('login')" class="text-primary hover:underline ml-1">Entrar</button>
        </p>
      </div>
    </div>

    <div class="mt-4 flex items-center justify-center gap-2 text-xs text-muted-foreground">
      <lucide-icon [img]="Shield" class="h-3.5 w-3.5 text-success"></lucide-icon>
      Demo: use qualquer email e senha para acessar
    </div>
  </div>
</div>
